<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WA Presence Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23; color: #e0e0e0;
            min-height: 100vh; padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #1a1a3e, #2d1b69);
            padding: 20px 16px; text-align: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
        .header .subtitle { font-size: 12px; color: #a0a0c0; margin-top: 4px; }
        
        /* Connection Status */
        .connection-status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; font-size: 13px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.connected { background: #22c55e; box-shadow: 0 0 8px #22c55e88; animation: pulse 2s infinite; }
        .status-dot.disconnected { background: #ef4444; }
        .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
